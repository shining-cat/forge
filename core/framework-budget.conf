# framework-budget.conf — component definitions for the framework-budget audit
# (forge-context.sh framework-budget)
#
# Each component below is measured at audit time: file rows have `wc -c` run
# against the path; script-out rows have the script invoked and its stdout
# measured. The total is the FRAMEWORK ENTRY TAX — bytes the Claude Code
# session pays just to bring up a Forge session, before any project work.
#
# Format:  <category>|<label>|<source-type>|<source-spec>
#
# Categories (used for display grouping):
#   skill     — SKILL.md files always loaded by Claude Code
#   user      — user memory + global config
#   project   — per-project vault content (INDEX, checkpoint)
#   recovery  — output of forge-context.sh and adjacent recovery scripts
#   calendar  — calendar-fetch output (if enabled)
#   config    — forge.conf and related config files
#
# Source types:
#   file       — direct file read (source-spec = path, with $HOME / $VAULT_PATH
#                / $FORGE_REPO / $HOME_DIR expanded at runtime)
#   script-out — invoke command and capture stdout (source-spec = full command line)
#
# Missing-source handling: components whose source path doesn't exist (or
# whose script invocation fails) report 0 bytes and don't crash. Edit-or-
# remove a row if a component is no longer relevant.
#
# To add a component: append a new line in the appropriate category section.
# To remove: delete or comment-out the row. To change a path: edit in place.

# ── skill ────────────────────────────────────────────────
skill|forge/SKILL.md|file|$HOME/.claude/skills/forge/SKILL.md
skill|wellness-coach/SKILL.md|file|$HOME/.claude/skills/wellness-coach/SKILL.md
skill|keeper/SKILL.md|file|$HOME/.claude/skills/keeper/SKILL.md
skill|refiner/SKILL.md|file|$HOME/.claude/skills/refiner/SKILL.md
skill|plan-reviewer/SKILL.md|file|$HOME/.claude/skills/plan-reviewer/SKILL.md

# ── user ─────────────────────────────────────────────────
user|MEMORY.md|file|$HOME/.claude/projects/-Users-shiva-bernhard-m10s-io/memory/MEMORY.md

# ── project (active = forge) ─────────────────────────────
project|forge/INDEX.md|file|$VAULT_PATH/PERSO/forge/INDEX.md
project|forge/current-checkpoint.md|file|$VAULT_PATH/PERSO/forge/current-checkpoint.md

# ── recovery (script outputs) ────────────────────────────
recovery|forge-context.sh recover|script-out|$HOME/.claude/scripts/forge-context.sh recover
recovery|forge-context.sh friction-tail|script-out|$HOME/.claude/scripts/forge-context.sh friction-tail

# ── calendar ─────────────────────────────────────────────
calendar|forge-calendar.sh entry-fetch|script-out|$HOME/.claude/scripts/forge-calendar.sh entry-fetch

# ── config ───────────────────────────────────────────────
config|forge.conf|file|$HOME/.claude/forge.conf

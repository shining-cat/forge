# SKILL.md line budgets — audit option C
# Format: path=N (path is relative to FORGE_REPO, N is the maximum allowed line count).
# Status thresholds: green ≤80%, yellow 80-100%, red >100%.
# Run: ~/.claude/scripts/forge-context.sh skill-budgets
# Flags: --json (machine output), --quiet (suppress green rows).
# Exit code: 0 if no red rows, 1 if any red. Yellow does not fail (warning band).

# Core SKILLs — budgets sized so post-PR-#28 baselines (391, 268) land
# comfortably in GREEN (~76-78% of budget). YELLOW band starts at 80% and
# acts as a "you're approaching the ceiling, next section should probably
# be a reference" signal. RED at 100% is the hard alert.
adapters/claude-code/skills/forge/SKILL.md=500
adapters/claude-code/modules/wellness-coach/skills/wellness-coach/SKILL.md=350

# References extracted by PR #28 — keep them focused.
# They exist because the parent SKILL was bloated; budget enforces that they
# stay topical instead of becoming the next bloat target.
core/references/wellness-cold-start.md=200
core/references/prose-wind-down.md=200
core/references/wrap-up-state.md=200
core/references/friction-harvest.md=200
adapters/claude-code/modules/wellness-coach/references/onboarding.md=250
adapters/claude-code/modules/wellness-coach/references/conflict-resolution.md=200

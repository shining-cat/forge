# Forge tmux config — minimal overrides applied on top of the user's own ~/.tmux.conf.
#
# Loaded via `tmux -f ~/.claude/forge-tmux.conf ...` by forge-shell-init.sh.
# Sources the user's ~/.tmux.conf first (if any), then forces the settings
# Forge needs to keep Claude Code usable inside tmux.

# Preserve user's own tmux preferences when present.
source-file -q ~/.tmux.conf

# Mouse on — tmux intercepts wheel events itself and routes them to its own
# scrollback. Without this, xterm-family terminals (incl. iTerm2 with default
# prefs) translate wheel events to arrow keys on the tmux alt-screen, which
# Claude Code receives as junk input ("Scroll wheel is sending arrow keys").
# On Mac, the suggested escape hatches (PgUp/PgDn) don't exist on the keyboard,
# so without this setting scroll is effectively dead.
set -g mouse on
